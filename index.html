<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>韓國行 · 2026 首爾之旅</title>
<style>
  :root{
    --bg:#f3ebe8;
    --bg2:#e8dcd9;
    --card:rgba(255,255,255,.58);
    --card-border:rgba(150,120,120,.22);
    --accent:#c48b8b;
    --accent2:#b3a0ac;
    --text:#5c4d4a;
    --muted:#9a8781;
    --line:rgba(150,120,120,.25);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:"Noto Sans TC","Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;
    color:var(--text);
    background:
      radial-gradient(1200px 600px at 10% -10%,rgba(179,160,172,.35),transparent 60%),
      radial-gradient(1000px 500px at 100% 0%,rgba(196,139,139,.32),transparent 55%),
      linear-gradient(180deg,var(--bg),var(--bg2));
    background-attachment:fixed;
    min-height:100vh;
    line-height:1.6;
  }
  .wrap{max-width:820px;margin:0 auto;padding:0 20px 80px}

  header{
    text-align:center;
    padding:70px 20px 40px;
  }
  header h1{
    font-size:clamp(2.1rem,7vw,3.4rem);
    font-weight:800;
    letter-spacing:.04em;
    margin:.3em 0 .2em;
    background:linear-gradient(90deg,#b57e7e,#c89aa2,#a596a8);
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;
  }
  header .dates{
    display:inline-block;margin-top:18px;padding:8px 20px;
    border:1px solid var(--card-border);border-radius:999px;
    background:var(--card);font-size:.95rem;color:var(--text);
    backdrop-filter:blur(6px);
  }

  .tabs{
    display:flex;flex-wrap:wrap;gap:8px;justify-content:center;
    position:sticky;top:0;z-index:10;margin-top:10px;
    padding:12px 0;
    background:linear-gradient(180deg,rgba(243,235,232,.95),rgba(243,235,232,.55));
    backdrop-filter:blur(8px);
  }
  .tab-btn{
    font-family:inherit;cursor:pointer;
    border:1px solid var(--card-border);
    background:var(--card);color:var(--muted);
    padding:8px 15px;border-radius:999px;font-size:.92rem;font-weight:700;
    letter-spacing:.03em;transition:all .15s ease;
  }
  .tab-btn:hover{color:var(--text);border-color:var(--accent2);transform:translateY(-1px)}
  .tab-btn.active{
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(196,139,139,.4);
  }

  .day{margin-top:24px;animation:fade .3s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .day-head{
    display:flex;align-items:baseline;gap:14px;
    padding:6px 4px 14px;
  }
  .day-num{
    font-size:1.5rem;font-weight:800;color:var(--accent);
    letter-spacing:.05em;white-space:nowrap;
  }
  .day-date{color:var(--muted);font-size:.95rem;font-weight:600}
  .day-week{color:var(--muted);font-size:.85rem;margin-left:auto}

  .timeline{position:relative;margin-top:6px}
  .timeline::before{
    content:"";position:absolute;left:7px;top:10px;bottom:10px;width:2px;
    background:linear-gradient(180deg,var(--accent),var(--accent2));
    opacity:.4;
  }
  .stop{position:relative;padding:8px 0 8px 34px}
  .dot{
    position:absolute;left:0;top:22px;width:16px;height:16px;border-radius:50%;
    background:#fff;border:3px solid var(--accent);z-index:2;
    box-shadow:0 0 0 4px rgba(196,139,139,.15);
  }
  .card{
    background:var(--card);border:1px solid var(--card-border);
    border-radius:14px;padding:12px 16px;
    backdrop-filter:blur(6px);transition:transform .15s ease,border-color .15s ease;
  }
  .card:hover{transform:translateX(3px);border-color:var(--accent)}
  .time{
    display:inline-block;font-variant-numeric:tabular-nums;
    font-weight:800;font-size:.9rem;color:var(--accent);
    letter-spacing:.04em;margin-bottom:4px;
  }
  .place{font-weight:700;font-size:1.05rem}
  .note{color:var(--muted);font-size:.82rem;margin-top:3px;line-height:1.5}
  .map{width:100%;height:190px;border:0;border-radius:10px;margin-top:10px;display:block;filter:saturate(.95)}
  .map.route{height:170px}
  .actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:10px}
  .btn{
    cursor:pointer;font-family:inherit;font-size:.8rem;font-weight:700;letter-spacing:.03em;
    padding:5px 15px;border-radius:999px;text-decoration:none;display:inline-block;
    transition:all .15s ease;
  }
  .maptoggle{color:var(--accent);background:rgba(196,139,139,.1);border:1px solid rgba(196,139,139,.45)}
  .maptoggle:hover,.maptoggle.on{background:var(--accent);color:#fff;border-color:transparent}
  .maptoggle.route{color:var(--accent2);background:rgba(179,160,172,.12);border:1px solid rgba(179,160,172,.5)}
  .maptoggle.route:hover,.maptoggle.route.on{background:var(--accent2);color:#fff;border-color:transparent}
  .naver{color:#fff;background:#5f9e73;border:1px solid #5f9e73}
  .naver:hover{background:#4f8a63;border-color:#4f8a63}
  .google{color:var(--accent);background:rgba(196,139,139,.1);border:1px solid rgba(196,139,139,.45)}
  .google:hover{background:var(--accent);color:#fff;border-color:transparent}
  .mappanel[hidden]{display:none}
  .mappanel .google{margin-top:9px}
  .route-note{color:var(--muted);font-size:.82rem;margin-top:6px;line-height:1.65}

  .stop.move{padding-top:2px;padding-bottom:2px}
  .dot.move{width:12px;height:12px;left:2px;top:20px;border-color:var(--accent2);box-shadow:0 0 0 4px rgba(179,160,172,.15)}
  .card.move{background:rgba(181,166,178,.32);border:1px dashed rgba(150,132,145,.55)}
  .move-title{font-weight:700;font-size:.9rem;color:var(--accent2);letter-spacing:.02em}

  footer{text-align:center;color:var(--muted);margin-top:60px;font-size:.85rem}
  footer .heart{color:var(--accent)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>韓國行</h1>
    <div class="dates">2026 / 08 / 12 &nbsp;–&nbsp; 08 / 19</div>
  </header>

  <nav class="tabs" id="tabs"></nav>
  <main id="itinerary"></main>

</div>

<script>
const WEEK = ["日","一","二","三","四","五","六"];
function weekOf(dateStr){
  const [y,m,d] = dateStr.split("/").map(Number);
  return "星期" + WEEK[new Date(y, m-1, d).getDay()];
}
function shortName(n){
  return n.replace(/（[^）]*）/g,"").replace(/\s*·.*$/,"").trim();
}
function toggleMap(btn){
  const panel = btn.closest(".card").querySelector(".mappanel");
  if(!panel) return;
  if(panel.hasAttribute("hidden")){
    const f = panel.querySelector("iframe");
    if(f && !f.src) f.src = f.dataset.src;
    panel.removeAttribute("hidden");
    btn.classList.add("on");
  } else {
    panel.setAttribute("hidden","");
    btn.classList.remove("on");
  }
}
function placeCard(t,name,note,q,hideMap){
  const enc = encodeURIComponent;
  const naver = /桃園|Taoyuan|TPE/.test(q) ? "" : `<a class="btn naver" href="https://map.naver.com/p/search/${enc(q)}" target="_blank" rel="noopener">Naver 地圖</a>`;
  const box = (q && !hideMap) ? `<div class="actions">
            <button class="btn maptoggle" onclick="toggleMap(this)">🗺️ 地圖</button>
            ${naver}
          </div>
          <div class="mappanel" hidden>
            <iframe class="map" data-src="https://www.google.com/maps?q=${enc(q)}&z=15&output=embed" loading="lazy"></iframe>
            <a class="btn google" href="https://www.google.com/maps/search/?api=1&query=${enc(q)}" target="_blank" rel="noopener">Google 開啟</a>
          </div>` : "";
  return `<div class="stop">
        <div class="dot"></div>
        <div class="card">
          <div class="time">${t}</div>
          <div class="place">${name}</div>
          ${note ? `<div class="note">${note}</div>` : ""}
          ${box}
        </div>
      </div>`;
}
function moveCard(fromName,toName,fromQ,toQ,routeText){
  const enc = encodeURIComponent;
  return `<div class="stop move">
        <div class="dot move"></div>
        <div class="card move">
          <div class="move-title">🚇 移動 · ${shortName(fromName)} → ${shortName(toName)}</div>
          ${routeText ? `<div class="route-note">${routeText}</div>` : ""}
          <div class="actions">
            <button class="btn maptoggle route" onclick="toggleMap(this)">🗺️ 路線圖</button>
          </div>
          <div class="mappanel" hidden>
            <iframe class="map route" data-src="https://maps.google.com/maps?saddr=${enc(fromQ)}&daddr=${enc(toQ)}&dirflg=r&output=embed" loading="lazy"></iframe>
          </div>
        </div>
      </div>`;
}
const ROUTES = {
  "仁川國際機場→K-Grand Hostel":
    "🚈 機場快線 A'REX 從 仁川機場第一航廈站（인천공항1터미널역）搭到 孔德站（공덕역），轉 5 號線（紫）到 往十里站（왕십리역），步行至旅館。約 1 小時 20 分。",
  "K-Grand Hostel→首爾奧林匹克體操競技場 KSPO DOME":
    "🚇 從 往十里站（왕십리역）搭 5 號線（紫）往 馬川／河南黔丹山（마천／하남검단산）方向，到 奧林匹克公園站（올림픽공원역）3 號出口，步行約 5 分。約 25 分。",
  "首爾奧林匹克體操競技場 KSPO DOME→K-Grand Hostel":
    "🚇 從 奧林匹克公園站（올림픽공원역）搭 5 號線（紫）往 傍花（방화）方向，回到 往十里站（왕십리역）。約 25 分。",
  "Hetras 聖水洞→K-Grand Hostel":
    "🚇 從 聖水站（성수역）搭 2 號線（綠）往 市廳（시청）方向，3 站到 往十里站（왕십리역）。約 6 分。",
  "K-Grand Hostel→樂天世界購物中心":
    "🚇 從 往十里站（왕십리역）搭 2 號線（綠）往 建大入口（건대입구）·蠶室（잠실）方向到 蠶室站（잠실역），站內直通樂天世界。約 20 分。",
  "樂天世界購物中心→仁川國際機場":
    "🚈 從 蠶室站（잠실역）搭 2 號線（綠）到 弘大入口站（홍대입구역），轉機場快線 A'REX 到 仁川機場第一航廈站（인천공항1터미널역）。約 1 小時 40 分，務必預留時間。",
};
function renderStops(stops){
  let out = "";
  stops.forEach((s,idx)=>{
    const [t,name,note,q,hideMap] = s;
    out += placeCard(t,name,note,q,hideMap);
    const nx = stops[idx+1];
    if(nx && q && nx[3] && q!==nx[3]){
      const key = shortName(name) + "→" + shortName(nx[1]);
      out += moveCard(name, nx[1], q, nx[3], ROUTES[key]);
    }
  });
  return out;
}
const HOSTEL = "K-Grand Hostel Seoul Dongdaemun";
const ICN_STA = "인천공항1터미널역";
const KSPO  = "KSPO DOME 올림픽체조경기장";

const DATA = [
  {date:"2026/08/12", stops:[
    ["17:00","桃園國際機場 · 報到","第一航廈 T1｜提前 3 小時抵達機場","桃園國際機場"],
    ["20:00","IT602 ✈ 桃園 TPE → 仁川 ICN","虎航 tigerair｜20:00 起飛 → 23:30 抵達"],
    ["23:30","仁川國際機場 · 抵達","第一航廈 T1","인천국제공항"],
  ]},
  {date:"2026/08/13", stops:[
    ["01:35","Darakhyu 膠囊旅館（仁川國際機場第一航廈 T1）","入住 20:00 後 · 房間 12 小時制（超時每小時 +₩10,000）· ☎ 032-743-5000",""],
    ["08:00","仁川國際機場（第一航廈 T1）","",ICN_STA,true],
    ["10:53","K-Grand Hostel（DDM, Wangsimni）","🧳 放行李（先寄放行李，再出門）",HOSTEL],
    ["11:36","Gen.G esports","","Gen.G esports Seoul"],
    ["11:56","T1 Cafe & Arena","","T1 Cafe and Arena Seoul"],
    ["13:25","Hetras 聖水洞","","Hetras 성수동"],
    ["17:15","K-Grand Hostel（DDM, Wangsimni）","",HOSTEL],
  ]},
  {date:"2026/08/14", stops:[
    ["00:00","K-Grand Hostel（DDM, Wangsimni）","",HOSTEL],
    ["10:38","首爾奧林匹克體操競技場 KSPO DOME","",KSPO],
    ["22:38","K-Grand Hostel（DDM, Wangsimni）","",HOSTEL],
  ]},
  {date:"2026/08/15", stops:[
    ["00:00","K-Grand Hostel（DDM, Wangsimni）","",HOSTEL],
    ["10:38","首爾奧林匹克體操競技場 KSPO DOME","",KSPO],
    ["22:38","K-Grand Hostel（DDM, Wangsimni）","",HOSTEL],
  ]},
  {date:"2026/08/16", stops:[
    ["00:00","K-Grand Hostel（DDM, Wangsimni）","",HOSTEL],
    ["10:38","首爾奧林匹克體操競技場 KSPO DOME","",KSPO],
    ["22:38","K-Grand Hostel（DDM, Wangsimni）","",HOSTEL],
  ]},
  {date:"2026/08/17", stops:[
    ["00:00","K-Grand Hostel（DDM, Wangsimni）","",HOSTEL],
    ["10:41","首爾塔","","N서울타워"],
    ["12:29","Zoolung Zoolung","","Zoolung Zoolung Seoul"],
    ["14:15","K-Grand Hostel（DDM, Wangsimni）","",HOSTEL],
  ]},
  {date:"2026/08/18", stops:[
    ["00:00","K-Grand Hostel（DDM, Wangsimni）","",HOSTEL],
    ["11:33","樂天世界購物中心","","롯데월드몰"],
    ["21:30","仁川國際機場 · 報到","第一航廈 T1｜提前 3 小時（航班 00:30 起飛）",ICN_STA,true],
  ]},
  {date:"2026/08/19", stops:[
    ["00:30","IT603 ✈ 仁川 ICN → 桃園 TPE","虎航 tigerair｜00:30 起飛 → 02:15 抵達"],
    ["02:15","桃園國際機場 · 抵達","第一航廈 T1 · 回到台灣 🇹🇼",""],
  ]},
];

const root = document.getElementById("itinerary");
const tabs = document.getElementById("tabs");
const sections = [], buttons = [];

function show(i){
  sections.forEach((s,idx)=>{ s.hidden = idx!==i; });
  buttons.forEach((b,idx)=>b.classList.toggle("active", idx===i));
  window.scrollTo({top:0, behavior:"smooth"});
}

DATA.forEach((day, i) => {
  const sec = document.createElement("section");
  sec.className = "day";
  sec.hidden = i!==0;
  sec.innerHTML = `
    <div class="day-head">
      <span class="day-num">第 ${i+1} 天</span>
      <span class="day-date">${day.date.replaceAll("/", " / ")}</span>
      <span class="day-week">${weekOf(day.date)}</span>
    </div>
    <div class="timeline">
      ${renderStops(day.stops)}
    </div>`;
  root.appendChild(sec);
  sections.push(sec);

  const btn = document.createElement("button");
  btn.className = "tab-btn" + (i===0 ? " active" : "");
  btn.textContent = "第" + (i+1) + "天";
  btn.addEventListener("click", () => show(i));
  tabs.appendChild(btn);
  buttons.push(btn);
});
</script>
</body>
</html>
